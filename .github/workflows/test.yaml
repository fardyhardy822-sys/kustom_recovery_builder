name: Python 2 on Ubuntu 24 Test

on:
  workflow_dispatch:
    inputs:
      MANIFEST_BRANCH:
        description: 'Branch'
        required: true
        default: 'twrp-9.0'

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Python 2.7 (Ubuntu 24.04 Noble)
        if: github.event.inputs.MANIFEST_BRANCH != 'twrp-11' && github.event.inputs.MANIFEST_BRANCH != 'twrp-12.1'
        run: |
          sudo apt update
          sudo apt install -y libssl-dev libffi-dev libncurses5-dev zlib1g-dev wget tar
        
          # Download from a verified stable release tag
          # We use -L to follow redirects and a User-Agent to prevent 403/404 errors
          echo "Downloading Python 2.7.18..."
          curl -fSL "https://github.com/astral-sh/python-build-standalone/releases/download/20230507/cpython-2.7.18+20230507-x86_64-unknown-linux-gnu-install_only.tar.gz" -o python2.tar.gz
        
          # Create directory and extract
          mkdir -p $HOME/python27
          tar -xzf python2.tar.gz -C $HOME/python27
        
          # Set up Symlinks
          # This forces the 'python' command to point to our new Python 2.7
          sudo ln -sf $HOME/python27/python/bin/python2.7 /usr/bin/python
          sudo ln -sf $HOME/python27/python/bin/python2.7 /usr/bin/python2
        
          # Verify
          echo "Check Python Version:"
          python --version

      - name: Test Python Logic
        run: |
          python -c "print 'Hello from Python 2! Syntax successful.'"
