name: Python 2 on Ubuntu 24 Test

on:
  workflow_dispatch:
    inputs:
      MANIFEST_BRANCH:
        description: 'Branch'
        required: true
        default: 'twrp-9.0'

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Python 2.7 (Ubuntu 24.04 Workaround)
        if: github.event.inputs.MANIFEST_BRANCH != 'twrp-11' && github.event.inputs.MANIFEST_BRANCH != 'twrp-12.1'
        run: |
          # Install dependencies needed for older software
          sudo apt update
          sudo apt install -y libssl-dev libffi-dev libncurses5-dev zlib1g-dev

          # Use a more reliable source for portable Python 2.7
          # This uses the python-build-standalone but with a direct browser-mimicking download
          wget https://github.com/indygreg/python-build-standalone/releases/download/20240107/cpython-2.7.18%2B20240107-x86_64-unknown-linux-gnu-install_only.tar.gz
          
          # Create directory and extract
          mkdir -p $HOME/python27
          tar -xzf cpython-2.7.18+20240107-x86_64-unknown-linux-gnu-install_only.tar.gz -C $HOME/python27
          
          # Fix the symlinks globally
          # We use 'force' to overwrite any existing python3 links if necessary
          sudo ln -sf $HOME/python27/python/bin/python2.7 /usr/bin/python
          sudo ln -sf $HOME/python27/python/bin/python2.7 /usr/bin/python2
          
          # Verify installation
          echo "Python version check:"
          python --version
          echo "Python path check:"
          which python

      - name: Test Python Logic
        run: |
          python -c "print 'Hello from Python 2! Syntax successful.'"
