name: Python 2 on Ubuntu 24 Test

on:
  workflow_dispatch:
    inputs:
      MANIFEST_BRANCH:
        description: 'Branch'
        required: true
        default: 'twrp-9.0'

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compile Python 2 from Source (Ubuntu 24.04)
        if: github.event.inputs.MANIFEST_BRANCH != 'twrp-11' && github.event.inputs.MANIFEST_BRANCH != 'twrp-12.1'
        run: |
          # Step 1: Install Build Dependencies
          sudo apt update
          sudo apt install -y build-essential checkinstall libncursesw5-dev libssl-dev \
            libsqlite3-dev tk-dev libgdbm-dev libc6-dev libbz2-dev

          # Step 2: Download the Python 2 Source Code
          wget https://www.python.org/ftp/python/2.7.18/Python-2.7.18.tgz

          # Step 3: Extract and Compile
          tar -xvf Python-2.7.18.tgz
          cd Python-2.7.18
          ./configure --enable-optimizations
          make -j$(nproc)
          sudo make install

          # Step 4: Verify and Link
          python2 --version
          sudo ln -sf /usr/local/bin/python2.7 /usr/bin/python
          sudo ln -sf /usr/local/bin/python2.7 /usr/bin/python2
          python --version

      - name: Test Python Logic
        run: |
          python -c "print 'Hello from Python 2! Syntax successful.'"
