name: Python 2 on Ubuntu 24 Test

on:
  workflow_dispatch:
    inputs:
      MANIFEST_BRANCH:
        description: 'Branch'
        required: true
        default: 'twrp-9.0'

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Python 2.7 and Pip (Ubuntu 24.04)
        if: github.event.inputs.MANIFEST_BRANCH != 'twrp-11' && github.event.inputs.MANIFEST_BRANCH != 'twrp-12.1'
        run: |
          curl https://bootstrap.pypa.io/pip/2.7/get-pip.py -o get-pip.py
          sudo python get-pip.py
         
          python --version
          pip2 --version

      - name: Test Python Logic
        run: |
          python -c "print 'Hello from Python 2! Syntax successful.'"
